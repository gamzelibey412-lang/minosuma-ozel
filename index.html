<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Özel ❤️</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; justify-content: center; align-items: center; }
        .login-box { border: 2px solid #ff1744; padding: 30px; border-radius: 20px; text-align: center; width: 80%; max-width: 300px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ff1744; background: #111; color: #fff; text-align: center; }
        button { width: 100%; padding: 12px; border-radius: 10px; background: #ff1744; color: #fff; border: none; font-weight: bold; cursor: pointer; }
        #big-love { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; justify-content: center; align-items: center; z-index: 50; color: #ff1744; font-size: 10vw; font-weight: 900; text-align: center; }
        #main-content { display: none; width: 90%; max-width: 600px; text-align: center; z-index: 10; max-height: 90vh; overflow-y: auto; padding: 20px; }
        .typewriter { font-size: 1.2em; line-height: 1.6; margin-bottom: 30px; }
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 20px; }
        .time-box { background: rgba(255, 23, 68, 0.2); padding: 10px; border-radius: 10px; border: 1px solid #ff1744; }
        .time-box span { display: block; font-size: 1.2em; font-weight: bold; }
        .time-box label { font-size: 0.6em; color: #ff1744; }
        .heart { position: absolute; color: #ff1744; animation: fly 5s linear infinite; }
        @keyframes fly { 0% { transform: translateY(100vh); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-10vh); opacity: 0; } }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color:#ff1744">Sana Özel ❤️</h2>
            <input type="text" id="u" placeholder="Kullanıcı Adı">
            <input type="password" id="p" placeholder="Şifremiz">
            <button onclick="start()">Giriş Yap</button>
        </div>
    </div>

    <div id="big-love">SENİ ÇOK SEVİYORUM</div>

    <div id="main-content">
        <div id="text-target" class="typewriter"></div>
        <div class="timer-grid">
            <div class="time-box"><span id="days">0</span><label>GÜN</label></div>
            <div class="time-box"><span id="hours">0</span><label>SAAT</label></div>
            <div class="time-box"><span id="minutes">0</span><label>DAK</label></div>
            <div class="time-box"><span id="seconds">0</span><label>SN</label></div>
        </div>
        <div style="margin-top:20px; font-style:italic; color:#ff1744">...benimlesin</div>
    </div>

    <script>
        function createHeart() {
            const h = document.createElement('div');
            h.innerHTML = '❤️'; h.className = 'heart';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }
        setInterval(createHeart, 400);

        const lines = [
            "Dünyanın en güzel çiçeğine...", "Varlığınla hayatıma anlam katan,", "Gücüyle, zarafetiyle hayran bırakan sevgilim.", "",
            "Sen sadece bugün değil,", "Aldığım her nefeste en değerlisin.", "", "---", "",
            "Ellerinle dünyayı güzelleştiren,", "Gülüşünle karanlıkları silen kadın...", "Yüreğinin saflığı rehberim,", "Sevgin ise en büyük zenginliğim olsun.", "", "---", "",
            "8 Mart Dünya Kadınlar Günün Kutlu Olsun,", "İyi ki benimlesin, iyi ki varsın.", "Yıldızların altında, bir ömre boyu...", "", "SENİ ÇOK SEVİYORUM ❤️"
        ];

        let lIdx = 0, cIdx = 0;
        function type() {
            const t = document.getElementById('text-target');
            if (lIdx < lines.length) {
                if (cIdx < lines[lIdx].length) {
                    t.innerHTML += lines[lIdx].charAt(cIdx);
                    cIdx++; setTimeout(type, 50);
                } else {
                    t.innerHTML += "<br>"; lIdx++; cIdx = 0; setTimeout(type, 800);
                }
            }
        }

        function start() {
            const user = document.getElementById('u').value.toLowerCase().trim();
            const pass = document.getElementById('p').value.trim();
            if(user === "karicim" && pass === "071225") {
                document.getElementById('login-overlay').style.display = 'none';
                const bl = document.getElementById('big-love');
                bl.style.display = 'flex';
                setTimeout(() => {
                    bl.style.display = 'none';
                    document.getElementById('main-content').style.display = 'block';
                    type();
                }, 3000);
            } else { alert("Hatalı giriş!"); }
        }

        const startD = new Date(2025, 11, 7);
        setInterval(() => {
            const diff = new Date() - startD;
            document.getElementById('days').innerText = Math.floor(diff / 86400000);
            document.getElementById('hours').innerText = Math.floor((diff / 3600000) % 24);
            document.getElementById('minutes').innerText = Math.floor((diff / 60000) % 60);
            document.getElementById('seconds').innerText = Math.floor((diff / 1000) % 60);
        }, 1000);
    </script>
</body>
</html>
